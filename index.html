<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇹🇼 台湾行程</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;}

/* ── NAV TABS (top) ── */
#top-nav{
  position:fixed;top:0;left:0;right:0;z-index:600;
  background:#1a73e8;
  display:flex;flex-direction:column;
}
#top-nav-title{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px 6px;color:white;
}
#top-nav-title .flag{font-size:20px;}
#top-nav-title h1{font-size:14px;font-weight:700;}
#top-nav-title p{font-size:9px;opacity:.8;margin-top:1px;}
#mode-tabs{
  display:flex;border-top:1px solid rgba(255,255,255,.2);
}
.mode-tab{
  flex:1;padding:8px 4px;font-size:12px;font-weight:600;
  color:rgba(255,255,255,.7);background:transparent;border:none;cursor:pointer;
  border-bottom:3px solid transparent;transition:all .15s;
  text-align:center;
}
.mode-tab.active{color:white;border-bottom-color:white;}

/* ── VIEWS ── */
#view-map,#view-checklist,#view-optional{
  position:fixed;top:82px;left:0;right:0;bottom:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;
}
#view-map{overflow:hidden;display:block;}

/* MAP */
#map{position:absolute;top:0;left:0;right:0;bottom:0;}

/* bottom sheet */
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:400;
  background:white;border-radius:18px 18px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.18);
  display:flex;flex-direction:column;
  height:54px;max-height:calc(100vh - 90px);
  overflow:hidden;transition:height .3s cubic-bezier(.4,0,.2,1);
}
#sheet.expanded{height:60vh;}
#sheet-handle{flex-shrink:0;padding:9px 0 0;display:flex;justify-content:center;cursor:pointer;}
#sheet-handle::before{content:'';width:36px;height:4px;background:#ddd;border-radius:2px;display:block;}
#day-tabs{flex-shrink:0;display:flex;overflow-x:auto;gap:6px;padding:7px 12px 10px;scrollbar-width:none;}
#day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:#eef0f5;color:#555;transition:all .15s;white-space:nowrap;}
/* Move Leaflet attribution to top-right, below header */
.leaflet-bottom.leaflet-right{
  transition:none !important;
  bottom:auto !important;
  top:88px !important;
  right:4px !important;
}
.leaflet-control-attribution{
  font-size:9px !important;
  opacity:0.6;
  border-radius:6px 0 0 6px !important;
  padding:2px 5px !important;
  background:rgba(255,255,255,0.75) !important;
}

#map-places{flex:1;overflow-y:auto;padding:0 10px 20px;-webkit-overflow-scrolling:touch;}

/* Route banner */
.route-banner{
  margin:8px 0 4px;padding:10px 12px;
  background:#f0f7ff;border-radius:12px;border-left:3px solid #1a73e8;
}
.route-banner-title{font-size:11px;font-weight:700;color:#1a73e8;margin-bottom:4px;}
.route-step{font-size:11px;color:#555;line-height:1.6;display:flex;gap:6px;}
.route-step-icon{flex-shrink:0;width:18px;text-align:center;}

.section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#aaa;padding:10px 4px 5px;}

.map-card{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 12px;margin-bottom:6px;
  border-radius:12px;border:1.5px solid #eee;
  background:white;cursor:pointer;
  transition:border-color .15s,box-shadow .15s;
}
.map-card.sel{box-shadow:0 2px 12px rgba(0,0,0,.12);}
.card-emoji{font-size:20px;flex-shrink:0;margin-top:1px;line-height:1;}
.card-body{flex:1;min-width:0;}
.card-name{font-size:13px;font-weight:600;color:#111;line-height:1.3;}
.card-sub{font-size:10px;color:#999;margin-top:2px;}
.card-note{font-size:11px;color:#888;margin-top:5px;line-height:1.4;}
.card-badge{flex-shrink:0;font-size:9px;font-weight:700;padding:3px 7px;border-radius:10px;white-space:nowrap;align-self:flex-start;margin-top:2px;}

#fab{
  position:fixed;right:14px;bottom:64px;z-index:450;
  width:50px;height:50px;border-radius:50%;
  background:#1a73e8;color:white;border:none;font-size:22px;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.28);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
#fab:active{transform:scale(.9);}

/* ── CHECKLIST VIEW ── */
#view-checklist{background:#f5f6fa;padding:0 0 30px;}
.cl-day{margin:12px 10px 0;}
.cl-day-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:14px;
  color:white;font-weight:700;font-size:14px;
  margin-bottom:6px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.cl-day-header .cl-day-right{margin-left:auto;font-size:11px;opacity:.85;}
.cl-items{display:flex;flex-direction:column;gap:5px;}
.cl-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:12px;
  background:white;border:1.5px solid #eee;
  cursor:pointer;transition:all .15s;
}
.cl-item.done{background:#f8faf8;border-color:#c8e6c9;}
.cl-item.done .cl-item-name{color:#aaa;text-decoration:line-through;}
.cl-checkbox{
  width:22px;height:22px;border-radius:6px;
  border:2px solid #ddd;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .15s;background:white;
}
.cl-item.done .cl-checkbox{background:#4caf50;border-color:#4caf50;color:white;}
.cl-item-body{flex:1;min-width:0;}
.cl-item-name{font-size:13px;font-weight:600;color:#111;transition:color .15s;}
.cl-item-sub{font-size:10px;color:#999;margin-top:2px;}
.cl-item-note{font-size:11px;color:#888;margin-top:3px;line-height:1.4;}
.cl-item-emoji{font-size:18px;flex-shrink:0;}
.cl-progress{
  margin:6px 14px 0;height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden;
}
.cl-progress-bar{height:100%;border-radius:2px;transition:width .4s;}

/* route inside checklist */
.cl-route{
  margin:4px 0 8px;padding:10px 12px;
  background:#fff8e1;border-radius:12px;border-left:3px solid #f9a825;
  font-size:11px;color:#555;line-height:1.7;
}
.cl-route-title{font-weight:700;color:#e65100;margin-bottom:4px;font-size:11px;}

/* ── OPTIONAL VIEW ── */
#view-optional{background:#f5f6fa;padding:0 0 30px;}
.opt-header{padding:14px 14px 8px;font-size:16px;font-weight:700;color:#222;}
.opt-sub{padding:0 14px 10px;font-size:12px;color:#888;line-height:1.5;}
.opt-section-hdr{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.7px;color:#aaa;padding:12px 14px 5px;
}
.opt-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;margin:0 10px 5px;
  border-radius:12px;background:white;
  border:1.5px solid #eee;cursor:pointer;transition:all .15s;
}
.opt-item.done{background:#f8faf8;border-color:#c8e6c9;}
.opt-item.done .opt-name{color:#aaa;text-decoration:line-through;}
.opt-checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;background:white;transition:all .15s;}
.opt-item.done .opt-checkbox{background:#4caf50;border-color:#4caf50;color:white;}
.opt-body{flex:1;min-width:0;}
.opt-name{font-size:13px;font-weight:600;color:#111;}
.opt-meta{font-size:10px;color:#999;margin-top:2px;}
.opt-note{font-size:11px;color:#888;margin-top:3px;line-height:1.4;}
.opt-emoji{font-size:18px;flex-shrink:0;}
.opt-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:3px;}

/* Leaflet popup */
.leaflet-popup-content-wrapper{border-radius:14px;padding:0;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.22);border:none;}
.leaflet-popup-content{margin:0;min-width:190px;max-width:250px;}
.leaflet-popup-tip-container{display:none;}
.pu-head{padding:11px 13px 8px;color:white;}
.pu-title{font-size:13px;font-weight:700;line-height:1.3;}
.pu-sub{font-size:10px;opacity:.85;margin-top:2px;}
.pu-body{padding:9px 13px 11px;background:white;}
.pu-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;margin-bottom:5px;}
.pu-note{font-size:11px;color:#777;line-height:1.4;font-style:italic;}
.pu-maps{display:block;margin-top:8px;font-size:12px;font-weight:600;color:#1a73e8;text-align:center;padding:6px 8px;background:#f0f6ff;border-radius:8px;text-decoration:none;}
</style>
</head>

const CAT_EMOJI = { "美食":"🍜","饮料":"🧃","购物":"🛍️","景点":"📍","夜市":"🌙","推荐餐":"⭐" };
DAYS[0].places = DAYS.slice(1).flatMap(d => d.places.map(p => ({...p,_day:d})));

/* ════════════════════════════════════════
   STORAGE (localStorage)
════════════════════════════════════════ */
function loadChecked(ns){ try{ return JSON.parse(localStorage.getItem(ns)||'{}'); }catch(e){ return {}; } }
function saveChecked(ns,obj){ try{ localStorage.setItem(ns,JSON.stringify(obj)); }catch(e){} }

let clChecked = loadChecked('cl');
let optChecked = loadChecked('opt');

/* ════════════════════════════════════════
   MAP
════════════════════════════════════════ */
const map = L.map('map',{center:[25.05,121.54],zoom:13});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

// Home marker
const homeIcon = L.divIcon({
  className:'',
  html:`<div style="background:#e53935;width:36px;height:36px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:18px">🏠</div>`,
  iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20]
});
L.marker([HOME.lat,HOME.lng],{icon:homeIcon,zIndexOffset:1000})
  .addTo(map)
  .bindPopup(`<div class="pu-head" style="background:#e53935"><div class="pu-title">🏠 民宿（起点）</div><div class="pu-sub">昆明街160號</div></div><div class="pu-body"><div class="pu-note">每天行程从这里出发</div><a class="pu-maps" href="https://maps.google.com/?q=${HOME.lat},${HOME.lng}" target="_blank">📍 在 Google Maps 打开</a></div>`,{maxWidth:240});

function makeIcon(color,emoji){
  return L.divIcon({
    className:'',
    html:`<div style="background:${color};width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:16px;line-height:1">${emoji}</span></div>`,
    iconSize:[36,36],iconAnchor:[18,36],popupAnchor:[0,-38]
  });
}

let mapMarkers=[],activeMapCard=null;
const sheet=document.getElementById('sheet');
const fab=document.getElementById('fab');
let sheetOpen=false;

function setSheet(open){
  sheetOpen=open;
  sheet.classList.toggle('expanded',open);
  fab.textContent=open?'🗺️':'☰';
}
document.getElementById('sheet-handle').addEventListener('click',()=>setSheet(!sheetOpen));
fab.addEventListener('click',()=>setSheet(!sheetOpen));

function clearMapMarkers(){ mapMarkers.forEach(m=>map.removeLayer(m)); mapMarkers=[]; }

function renderMapDay(dayId){
  clearMapMarkers();
  if(activeMapCard){ activeMapCard.style.borderColor='#eee'; activeMapCard.classList.remove('sel'); activeMapCard=null; }
  const day=DAYS.find(d=>d.id===dayId);
  const list=document.getElementById('map-places');
  list.innerHTML='';

  // Route banner
  if(dayId!==0 && day.route){
    const rb=document.createElement('div');
    rb.className='route-banner';
    rb.innerHTML=`<div class="route-banner-title">🚇 交通路线（从民宿出发）</div>`+
      day.route.map(r=>`<div class="route-step"><span class="route-step-icon">${r.icon}</span><span>${r.text}</span></div>`).join('');
    list.appendChild(rb);
  }

  const groups={};
  day.places.forEach(p=>{
    const d=p._day||day;
    const key=dayId===0?`${d.label} · ${d.title}`:p.cat;
    (groups[key]=groups[key]||[]).push({...p,_day:d});
  });

  Object.entries(groups).forEach(([grp,places])=>{
    const hdr=document.createElement('div');
    hdr.className='section-hdr';hdr.textContent=grp;
    list.appendChild(hdr);
    places.forEach(p=>{
      const d=p._day||day;
      const color=d.color||day.color;
      const emoji=CAT_EMOJI[p.cat]||'📍';
      const card=document.createElement('div');
      card.className='map-card';
      card.style.borderColor='#eee';
      card.innerHTML=`
        <div class="card-emoji">${emoji}</div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-sub">${p.cat} · ${p.sub}</div>
          ${p.note?`<div class="card-note">${p.note}</div>`:''}
        </div>
        ${p.badge?`<div class="card-badge" style="background:${color}22;color:${color}">${p.badge}</div>`:''}
      `;
      const marker=L.marker([p.lat,p.lng],{icon:makeIcon(color,emoji)}).addTo(map);
      const mapsUrl=`https://maps.google.com/?q=${p.lat},${p.lng}`;
      marker.bindPopup(`
        <div class="pu-head" style="background:${color}">
          <div class="pu-title">${emoji} ${p.name}</div>
          <div class="pu-sub">${dayId===0?(d.label+' · '+d.title):(p.cat+' · '+p.sub)}</div>
        </div>
        <div class="pu-body">
          ${p.badge?`<span class="pu-badge" style="background:${color}22;color:${color}">${p.badge}</span>`:''}
          ${p.note?`<div class="pu-note">${p.note}</div>`:''}
          <a class="pu-maps" href="${mapsUrl}" target="_blank">📍 在 Google Maps 打开</a>
        </div>
      `,{maxWidth:250,minWidth:200});

      card.addEventListener('click',()=>{
        if(activeMapCard){activeMapCard.style.borderColor='#eee';activeMapCard.classList.remove('sel');}
        card.style.borderColor=color;card.classList.add('sel');activeMapCard=card;
        map.setView([p.lat,p.lng],16,{animate:true});marker.openPopup();
        setSheet(false);
        setTimeout(()=>card.scrollIntoView({block:'nearest',behavior:'smooth'}),350);
      });
      marker.on('click',()=>{
        if(activeMapCard){activeMapCard.style.borderColor='#eee';activeMapCard.classList.remove('sel');}
        card.style.borderColor=color;card.classList.add('sel');activeMapCard=card;
        setSheet(true);
        setTimeout(()=>card.scrollIntoView({block:'nearest',behavior:'smooth'}),350);
      });
      list.appendChild(card);
      mapMarkers.push(marker);
    });
  });

  const allPts=[{lat:HOME.lat,lng:HOME.lng},...mapMarkers.map(m=>m.getLatLng())];
  if(allPts.length>1) map.fitBounds(L.latLngBounds(allPts.map(p=>[p.lat,p.lng])),{padding:[50,50]});
}

// Day tabs
const tabsEl=document.getElementById('day-tabs');
DAYS.forEach(day=>{
  const btn=document.createElement('button');
  btn.className='day-tab'+(day.id===0?' active':'');
  btn.style.background=day.id===0?day.color:'#eef0f5';
  btn.style.color=day.id===0?'white':day.color;
  btn.textContent=day.label;
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.day-tab').forEach(t=>{
      const dd=DAYS.find(d=>d.label===t.textContent);
      t.style.background='#eef0f5';t.style.color=dd?dd.color:'#555';
    });
    btn.style.background=day.color;btn.style.color='white';
    renderMapDay(day.id);
  });
  tabsEl.appendChild(btn);
});

/* ════════════════════════════════════════
   CHECKLIST VIEW
════════════════════════════════════════ */
function renderChecklist(){
  const view=document.getElementById('view-checklist');
  view.innerHTML='';
  DAYS.slice(1).forEach(day=>{
    const places=day.places;
    const doneCount=places.filter(p=>clChecked[day.id+'_'+p.name]).length;
    const pct=places.length?Math.round(doneCount/places.length*100):0;

    const block=document.createElement('div');
    block.className='cl-day';

    // Day header
    const dh=document.createElement('div');
    dh.className='cl-day-header';
    dh.style.background=day.color;
    dh.innerHTML=`<span>${day.label}</span><span style="font-size:12px;font-weight:400">${day.title}</span><span class="cl-day-right">${doneCount}/${places.length} ✓</span>`;
    block.appendChild(dh);

    // Progress
    const prog=document.createElement('div');prog.className='cl-progress';
    const bar=document.createElement('div');bar.className='cl-progress-bar';
    bar.style.background=day.color;bar.style.width=pct+'%';
    prog.appendChild(bar);block.appendChild(prog);

    // Route
    if(day.route){
      const rt=document.createElement('div');rt.className='cl-route';
      rt.innerHTML=`<div class="cl-route-title">🚇 交通路线</div>`+
        day.route.map(r=>`<div>${r.icon} ${r.text}</div>`).join('');
      block.appendChild(rt);
    }

    // Items
    const items=document.createElement('div');items.className='cl-items';
    places.forEach(p=>{
      const key=day.id+'_'+p.name;
      const done=!!clChecked[key];
      const emoji=CAT_EMOJI[p.cat]||'📍';
      const item=document.createElement('div');
      item.className='cl-item'+(done?' done':'');
      item.innerHTML=`
        <div class="cl-checkbox">${done?'✓':''}</div>
        <div class="cl-item-emoji">${emoji}</div>
        <div class="cl-item-body">
          <div class="cl-item-name">${p.name}</div>
          <div class="cl-item-sub">${p.cat} · ${p.sub}</div>
          ${p.note?`<div class="cl-item-note">${p.note}</div>`:''}
        </div>
      `;
      item.addEventListener('click',()=>{
        clChecked[key]=!clChecked[key];
        saveChecked('cl',clChecked);
        renderChecklist();
      });
      items.appendChild(item);
    });
    block.appendChild(items);
    view.appendChild(block);
  });
}

/* ════════════════════════════════════════
   OPTIONAL VIEW
════════════════════════════════════════ */
function renderOptional(){
  const view=document.getElementById('view-optional');
  view.innerHTML='';

  const hdr=document.createElement('div');hdr.className='opt-header';hdr.textContent='🍴 自选美食 & 地点';
  view.appendChild(hdr);
  const sub=document.createElement('div');sub.className='opt-sub';
  sub.textContent='以下全部为自选，去了打勾，没去也没关系。包括你原本清单里所有美食，以及每区的额外推荐。';
  view.appendChild(sub);

  const grouped={};
  OPTIONAL.forEach(o=>{ (grouped[o.tag]=grouped[o.tag]||[]).push(o); });

  const tagColors={
    "用户清单":"#e53935","西门推荐":"#e67e22","信义推荐":"#8e44ad",
    "中正推荐":"#27ae60","中正/大安推荐":"#27ae60","士林推荐":"#16a085",
    "板橋推荐":"#2980b9","松山推荐":"#7f8c8d"
  };

  Object.entries(grouped).forEach(([tag,items])=>{
    const sh=document.createElement('div');sh.className='opt-section-hdr';sh.textContent=tag;
    view.appendChild(sh);
    const color=tagColors[tag]||'#555';
    items.forEach(o=>{
      const key='opt_'+o.name;
      const done=!!optChecked[key];
      const div=document.createElement('div');div.className='opt-item'+(done?' done':'');
      div.innerHTML=`
        <div class="opt-checkbox">${done?'✓':''}</div>
        <div class="opt-body">
          <div class="opt-name">${o.name}</div>
          <div class="opt-meta">${o.area}</div>
          ${o.note?`<div class="opt-note">${o.note}</div>`:''}
        </div>
        <div class="opt-badge" style="background:${color}22;color:${color}">${tag}</div>
      `;
      div.addEventListener('click',()=>{
        optChecked[key]=!optChecked[key];
        saveChecked('opt',optChecked);
        renderOptional();
      });
      view.appendChild(div);
    });
  });
}

/* ════════════════════════════════════════
   MODE SWITCH
════════════════════════════════════════ */
function switchMode(mode){
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    const modes=['map','checklist','optional'];
    t.classList.toggle('active',modes[i]===mode);
  });
  document.getElementById('view-map').style.display        = mode==='map'       ?'block':'none';
  document.getElementById('view-checklist').style.display  = mode==='checklist' ?'block':'none';
  document.getElementById('view-optional').style.display   = mode==='optional'  ?'block':'none';
  document.getElementById('fab').style.display             = mode==='map'       ?'flex':'none';
  if(mode==='checklist') renderChecklist();
  if(mode==='optional')  renderOptional();
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
renderMapDay(0);
setTimeout(()=>setSheet(true),500);
setTimeout(()=>setSheet(false),2200);
